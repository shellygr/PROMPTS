"""
A single message exchanged with the Shapes AI assistant. Each `createChatMessage`
call produces two messages: the persisted user message followed by the assistant's
response.
"""
type ChatMessage {
  """Unique identifier of the message."""
  id: ID!

  """
  ID of the user the message belongs to. The same user owns both the `user`
  message and the `assistant` response in a turn.
  """
  userId: ID!

  """
  Author of the message — `user` for caller-sent messages, `assistant`
  for the AI response.
  """
  role: String!

  """
  When the message was sent. For `user` messages this is the client-supplied
  timestamp; for `assistant` messages it is set when the response is persisted.
  """
  timestamp: Date!

  """
  Optional feedback flag set by the caller on an `assistant` message
  (thumbs-up / thumbs-down equivalent). Always null for `user` messages.
  """
  isHelpful: Boolean

  """
  ID of the conversation this message belongs to. Multiple messages in the
  same conversation share this ID.
  """
  conversationId: ID

  """
  Structured content of the message, ordered by sequence. Always non-empty
  for messages persisted by `createChatMessage`. Each block has a typed
  payload (e.g. text) — see `ChatMessageBlockType` for the variants.
  """
  blocks: [ChatMessageBlock!]!
}

"""
A single structured block within a `ChatMessage`.  A message is composed of
one or more blocks rendered in sequence; each block carries a typed
`payload` that varies by `type`.
"""
type ChatMessageBlock {
  """
  Discriminator selecting the concrete payload variant.  Match this against
  the `__typename` on `payload` when handling each variant.
  """
  type: ChatMessageBlockType!

  """
  Variant payload for this block.  Use a GraphQL inline fragment per variant
  (e.g. `... on ChatMessageTextBlockPayload { text }`) to read its fields.
  """
  payload: ChatMessageBlockPayload!
}

"""
Discriminator for `ChatMessageBlock` payload variants.  Generated from the
block-services registry — adding a new block type extends this enum
automatically.
"""
enum ChatMessageBlockType {
  TEXT
  ARTIFACT_REF
  REASONING
  TOOL_CALL
}

"""
Variant payload of a `ChatMessageBlock`.  The concrete type aligns with the
block's `type` discriminator (e.g. `TEXT` → `ChatMessageTextBlockPayload`).
"""
union ChatMessageBlockPayload = ChatMessageTextBlockPayload | ChatMessageArtifactRefBlockPayload | ChatMessageReasoningBlockPayload | ChatMessageToolCallBlockPayload

type ChatMessageTextBlockPayload {
  text: String!
}

type ChatMessageArtifactRefBlockPayload {
  artifactId: ID!

  """
  Hydrated artifact referenced by this block.  Resolved via
  `artifactsAPI.loadArtifact({ id: payload.artifactId })`.  Null when the
  artifact has been soft-deleted or is unreachable to the viewer.
  """
  artifact: Artifact
}

type ChatMessageReasoningBlockPayload {
  text: String!
}

type ChatMessageToolCallBlockPayload {
  toolCallId: String!
  toolName: String!
  input: JSON
  output: JSON
  outcome: String!
  errorText: String
}

"""
A typed payload produced by the assistant — e.g. a downloadable table — that
is rendered alongside its surrounding chat message. Artifacts persist
independently of the message that emitted them so the same artifact can be
referenced from multiple turns or surfaces.
"""
type Artifact {
  """ Stable identifier — the same id resolves to the same artifact across requests. 
  """
  id: ID!

  """ Soft-delete flag (1 = active, 2 = deleted). """
  status: Int!

  """ Discriminator selecting the artifact variant; matches the variant of `config`. 
  """
  type: ArtifactType!

  """ Human-readable label rendered in the artifact chrome. Nullable when the artifact has no title. 
  """
  title: String

  """ Per-variant render configuration. Selects `TableConfig` for `TABLE`, etc. 
  """
  config: ArtifactConfig!

  """
  Underlying data payload reachable via a time-limited URL. Null while the
  asset is still being uploaded (transiently null inside the in-flight
  materialisation transaction; never visible to other readers).
  """
  protectedAsset: ProtectedAsset

  """ Creation timestamp. """
  createdAt: Date!
}

"""
Discriminator for `Artifact` variants. Generated from `artifactTypes` —
adding a new variant extends this enum and requires a sibling entry in
`ArtifactServices` so `Artifact.config` resolves to a concrete shape.
"""
enum ArtifactType {
  TABLE
  CHART
}

"""
Variant render-config of an `Artifact`. The concrete type aligns with the
artifact's `type` discriminator (e.g. `TABLE` → `TableConfig`). Use a
GraphQL inline fragment per variant (e.g. `... on TableConfig { columns { key label } }`)
to read its fields.
"""
union ArtifactConfig = TableConfig | ChartConfig

"""
Column descriptor for a `TableConfig`.  Carries the render-time ORDER and
LABEL for one column — `key` selects a column from the underlying CSV
header; `label` overrides the rendered header text.
"""
type TableColumn {
  """ Header key from the source CSV.  Required — used to project + order CSV columns. 
  """
  key: String!

  """ Human-readable header rendered above the column. """
  label: String!

  """
  Hint for downstream consumers; the renderer does not coerce cells.  Format
  conversion stays a server concern — if a column needs "Yes/No" instead of
  "true/false", the CSV should already carry it that way.
  """
  type: String

  """
  Alignment hint for downstream consumers; the renderer left-aligns every
  column today.  Kept for forward-compat with custom per-column alignment.
  """
  align: String
}

"""
Optional summary stats persisted with the artifact so clients can render
loading shimmers before the full CSV is fetched.  Backward-compatible:
artifacts persisted before this field shipped still validate; renderers fall
back to a single status-message line when `stats` is absent.
"""
type TableStats {
  """ Total row count in the materialised CSV. """
  rowCount: Int!
}

"""
`ArtifactConfig` variant when `artifact.type === TABLE`.  Columns define
the render order and header labels; the CSV is reachable via the artifact's
`protectedAsset` (the public surface intentionally does not expose a
presigned URL field — fetch through the standard asset-download endpoint).
"""
type TableConfig {
  """ Column descriptors in render order. """
  columns: [TableColumn!]!

  """ Optional metadata describing the underlying data. """
  stats: TableStats
}

"""
Variant discriminator within a `ChartConfig`.  Selects the per-variant
renderer on the client; ALSO drives the variant ↔ required-field check on
the server.
"""
enum ChartVariant {
  LINE
  BAR
  PIE
}

"""
Per-series descriptor for `LINE` and `BAR` chart variants.  Empty for
`PIE` (which uses `categoryKey` + `valueKey` instead).
"""
type ChartSeries {
  """ CSV column key for this series — must match a header in the materialised CSV. 
  """
  key: String!

  """ Human-readable label rendered in legend / tooltip. """
  label: String!
}

"""
Optional summary stats persisted with the artifact so clients can render
loading shimmers before the full CSV is fetched.  Populated server-side by
`ChartArtifactService.buildAsset`; the agent never emits stats.
"""
type ChartStats {
  """ Total row count in the materialised CSV. """
  rowCount: Int!
}

"""
`ArtifactConfig` variant when `artifact.type === CHART`.  Loose at the
field level (variant-specific fields are nullable in the schema), strict at
the server boundary — `ChartArtifactService.normaliseConfig` enforces the
variant ↔ required-field matrix.
"""
type ChartConfig {
  """ Variant discriminator; drives the per-variant renderer. """
  variant: ChartVariant!

  """ CSV column key for the x-axis.  Required for `LINE` / `BAR`; null for `PIE`. 
  """
  xKey: String

  """ CSV column key for slice category.  Required for `PIE`; null for `LINE` / `BAR`. 
  """
  categoryKey: String

  """ CSV column key for slice value.  Required for `PIE`; null for `LINE` / `BAR`. 
  """
  valueKey: String

  """ Series descriptors in render order.  Non-empty for `LINE` / `BAR`; empty for `PIE`. 
  """
  series: [ChartSeries!]!

  """ `BAR` only — stacked vs grouped bars.  Null for other variants. """
  stacked: Boolean

  """ `LINE` only — smoothed curve vs straight segments.  Null for other variants. 
  """
  smooth: Boolean

  """ Optional metadata describing the underlying data. """
  stats: ChartStats
}
