type Query {
  me: User!
  employees(ids: [ID]): [Employee]!
  employeeFieldValues(ids: [ID], filters: EmployeeFieldValueFilters): [EmployeeFieldValue]!
  employeeFieldTypes(ids: [ID!], filters: EmployeeFieldTypeFilters): [EmployeeFieldType!]!
  timeAwayReasons(ids: [ID]): [TimeAwayReason]!
  timeAwayBookings(ids: [ID], filters: TimeAwayBookingFilters): [TimeAwayBooking]!
  employeeAnniversaries(filters: EmployeeAnniversaryFilters): [EmployeeAnniversary]!
}

type Mutation {
  """
  The request should contain a *Refresh-Token* header with the old refresh token.
  """
  refreshToken: AuthenticationResponse!

  """
  Requires a Super Admin or Admin (with the *Add employees* permission) permission levels.
  """
  createEmployees(arrayOfValues: [EmployeeCreate]!): [Employee]!

  """Allowed for Super Admins."""
  terminateEmployees(arrayOfValues: [EmployeeTerminate]!): [Employee]!
  deleteTimeAwayBookingAttachments(timeAwayBookingIds: [ID]!): [ProtectedAsset]!

  """
  Create or update complete attendance records. Use this when you have full attendance data
  (employee, day, clock-in and/or clock-out times).
  
  Behavior:
  - If an 'id' is provided, the existing attendance record is updated with the given fields. Times are validated against the existing record's 'day'.
  - If no 'id' is provided, a new attendance record is created. 'employeeId' and 'day' are required for creation.
  - clockInAt and clockOutAt must fall on the same calendar day (in UTC) as 'day'.
  - Overlapping attendance records for the same employee and day will cause an error.
  - All dates should be provided in ISO 8601 format with timezone (e.g., "2025-06-10T09:00:00+03:00").
  
  For discrete clock events from time-tracking devices, use submitAttendanceEvents instead.
  """
  createOrUpdateAttendances(arrayOfValues: [AttendanceCreateOrUpdate]!): [Attendance]!

  """
  Submit individual clock-in/out events that are automatically paired and merged with existing attendance records.
  Use this when you have discrete clock events (e.g., from a time clock device) rather than complete attendance records.
  For complete attendance records with known day/id, use createOrUpdateAttendances instead.
  
  Behavior:
  - A clock-out event is merged into the latest open attendance (has clockInAt, no clockOutAt) for the same employee and day.
  - A clock-in event creates a new attendance record, or fills in a record missing clockInAt.
  - Multiple events in the same request for the same employee+day are paired before merging with existing records.
  """
  submitAttendanceEvents(events: [AttendanceEvent]!): [Attendance]!

  """
  Send a message to the Shapes AI assistant and receive its response.
  
  Returns a list of two messages: the persisted `user` message followed by
  the `assistant`'s response. Both share the same `conversationId`.
  
  Behavior:
  - If `conversationId` is omitted, a new conversation is created and its
    title is auto-generated from the first message.
  - If `conversationId` is provided, the message is appended to that
    conversation. Only conversations owned by the calling user are accepted.
  - The agent call is bounded by an extended socket timeout (350s) — long
    reasoning chains will not be cut off at the default 120s ceiling.
  """
  createChatMessage(
    """
    The user's message text. Persisted as the fallback text on the
    resulting `user` message and forwarded to the agent.
    """
    message: String!

    """
    Client-supplied timestamp for the `user` message. ISO 8601 with timezone.
    """
    timestamp: Date!

    """
    Existing conversation to append to. Omit (or pass null) to start a
    new conversation.
    """
    conversationId: ID
  ): [ChatMessage]!
}

scalar Date

scalar JSON

