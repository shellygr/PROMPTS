"""
A single value of an employee field — the per-employee row that pairs
an `EmployeeFieldType` (the schema/column) with the actual value for
that employee. One employee usually has many `EmployeeFieldValue`
rows, one per field defined in the account.
"""
type EmployeeFieldValue {
  id: ID!
  employeeId: ID!

  """
  The actual value. Shape depends on the parent field's
  `employeeFieldType.fieldType`:
  - Primitive kinds (`text`, `long_text`, `link`, `number`,
    `date`, `phone`, `checkbox`, `rating`, `employee_email`,
    `start_date`, `termination_date`, `workflow_progress`) —
    the raw value (string / number / boolean / ISO date string).
  - Select-style kinds (`single_select`, `multi_select` and their
    derived subtypes `city`, `state`, `currency`,
    `termination_reason`, `first_day_of_working_week`) — the
    `EmployeeFieldValueOption.id`.
  - Structured-JSON kinds — `country` stores
    `{ countryCode, countryName }` directly.
  - Entity-reference kinds (`team`, `job`, `office`, `people`,
    `reports_to`, `file`, `profile_picture`) — the FK ID of the
    referenced row.
  Branch on `employeeFieldType.fieldType` (typed enum) before reading.
  """
  fieldValue: JSON!

  """
  Pre-flattened text rendering of `fieldValue` for search and display
  (e.g. for an entity reference, the referenced row's display name).
  Server-computed; null when no flattening exists for the kind.
  """
  textValue: String
  employeeFieldTypeId: ID!
  employeeFieldType: EmployeeFieldType!

  """When the field value was last updated. Expected to be in UTC timezone."""
  updatedAt: Date!

  """No effective date means the field value is effective immediately."""
  effectiveDate: Date
}

input EmployeeFieldValueFilters {
  fieldTypeContext: [EmployeeFieldTypeContext!]
  employeeFieldTypeId: [ID!]
  employeeId: [ID!]
  updatedAt: DateInterval
}

"""
Schema metadata for a single employee field — the column-like definition,
not a value. Each `EmployeeFieldType` describes one slot on the employee
record (built-in like first name / start date, or custom like a tenure
rating). Pair with `EmployeeFieldValue` to read the actual per-employee
values.
"""
type EmployeeFieldType {
  id: ID!

  """
  Storage and rendering kind for this field. Use this rather than
  pattern-matching on `fieldName` — `fieldName` is account-
  customisable while `fieldType` is the canonical server-side
  discriminator.
  """
  fieldType: EmployeeFieldTypeKind!

  """
  Where this field surfaces in the product (e.g. profile, capacity,
  onboarding). Independent of `fieldType`: two fields with the same
  `fieldType` can live in different contexts.
  """
  context: EmployeeFieldTypeContext!

  """
  Per-kind configuration blob. Shape varies by `fieldType`:
  `single_select` / `multi_select` and their derived subtypes hold
  `{ valueOptions: [{ id, value }, ...] }`; `number` / `currency`
  may hold validation hints; many primitive kinds leave this null.
  Treat unknown keys as ignorable.
  """
  data: JSON

  """
  Human-readable label rendered in the profile UI and on the value
  column (e.g. "First name", "Tenure rating"). Account-customisable —
  use `fieldType` (typed) for branching logic; use `fieldName` for
  rendering and search.
  """
  fieldName: String!
}

enum EmployeeFieldTypeContext {
  address
  city
  contract_documents
  contract_type
  country
  custom
  date_of_birth
  department
  email
  emergency_contact_full_name
  emergency_contact_phone
  emergency_contact_relationship
  employee_capacity
  employee_id
  employee_phone
  employee_profile_picture
  first_name
  gender
  job
  last_name
  level
  national_id
  nationality
  ni_number
  office
  passport_number
  personal_email
  reports_to
  salaryType
  salary_amount
  salary_amount_currency
  ssn
  start_date
  state_province
  team
  termination_date
  termination_reason
  unique_identifier
  zip_code
}

"""
Storage / rendering kind of an employee field type. Four families:
direct primitives stored on `EmployeeFieldValue.value` (`text`,
`long_text`, `link`, `number`, `date`, `phone`, `checkbox`,
`rating`, `employee_email`, `start_date`, `termination_date`,
`workflow_progress`); select-style values referencing the option set
in `EmployeeFieldType.valueOptions` (`single_select`,
`multi_select`, and their derived subtypes `city`, `state`,
`currency`, `termination_reason`, `first_day_of_working_week`);
structured-JSON kinds with a fixed shape (`country` stores
`{ countryCode, countryName }`); and entity references to a separate
table (`team`, `job`, `office`, `people`, `reports_to`,
`file`, `profile_picture`). Closed set — clients should treat
unrecognised values as fail-closed.
"""
enum EmployeeFieldTypeKind {
  checkbox
  city
  country
  currency
  date
  employee_email
  file
  first_day_of_working_week
  job
  link
  long_text
  multi_select
  number
  office
  people
  phone
  profile_picture
  rating
  reports_to
  single_select
  start_date
  state
  team
  termination_date
  termination_reason
  text
  workflow_progress
}

input EmployeeFieldTypeFilters {
  fieldType: [EmployeeFieldTypeKind!]
  context: [EmployeeFieldTypeContext!]
}

"""
A category of leave (vacation, sick, holiday, etc.) that employees can
book against via `TimeAwayBooking`. Each reason carries one or more
`TimeAwayReasonPolicy` variants that define balance / approval rules
for different employee populations.
"""
type TimeAwayReason {
  id: ID!

  """
  Lineage of this reason. Use this rather than pattern-matching on
  `name` (`name` is account-customisable, `type` is canonical).
  """
  type: TimeAwayReasonType!

  """
  Display name (e.g. "Vacation", "Sick leave"). Account-customisable —
  use this for human rendering; use `type` when you need to branch on
  lineage. Not unique across reasons in the same account.
  """
  name: String!

  """
  The default policy applied when an employee not assigned to a specific
  policy books against this reason. Null when the reason has no default
  policy (employees must be explicitly assigned to book at all).
  """
  defaultTimeAwayReasonPolicyId: ID

  """Display order in the booking-reason picker. Lower is rendered first."""
  position: Int
  status: Int!

  """
  True when individual bookings of this reason are visible only to the
  booker, their manager, and HR — used for medical / sensitive leave.
  False (the default) means bookings of this reason are visible to
  teammates for coverage planning.
  """
  isPrivate: Boolean!
}

"""
Lineage of a time-away reason — drives policy semantics, balance
accounting, and UI grouping. `time_off` is the standard paid/unpaid
leave bucket (vacation, personal, etc.); `working_away` covers business
travel and remote-from-elsewhere days; `holiday` is the public /
observed-holiday calendar; `non_working_day` marks days the employee is
contractually not expected to work; `extended_leave` is for long-form
absences (parental, sabbatical, sick leave) that need their own balance
+ policy; `special_leave` is account-defined leave types that don't fit
the other lineages.
"""
enum TimeAwayReasonType {
  extended_leave
  holiday
  non_working_day
  special_leave
  time_off
  working_away
}

"""
A single time-away request — vacation, sick leave, or any other absence.
Created by an employee (or by an admin/manager on their behalf), then
transitioned through an approval lifecycle via `bookingStatus`. The
date range is exclusive of unrelated weekends/holidays per the
underlying `TimeAwayReasonPolicy` — see `TimeAwayBooking.timeAwayReason`.
"""
type TimeAwayBooking {
  id: ID!

  """
  The employee taking the time off (the absentee). Distinct from
  `bookedByEmployeeId`, which is whoever filed the request — the two
  are usually the same but can differ when an admin or manager books on
  behalf of someone else.
  """
  employeeId: ID!

  """FK to the underlying `TimeAwayReason` (vacation, sick, etc.)."""
  timeAwayReasonId: ID!

  """
  Start of the absence as a JSON object: `{ date: "YYYY-MM-DD",
  halfDayPart: "morning" | "afternoon" | null }`. The `halfDayPart`
  key is null for full-day starts; populated only when the booking's
  underlying reason policy enables half-day tracking. Always paired with
  `toDate` — the full absence is `[fromDate, toDate]` inclusive.
  """
  fromDate: JSON!

  """
  End of the absence as a JSON object: `{ date: "YYYY-MM-DD",
  halfDayPart: "morning" | "afternoon" | null }`. Same shape as
  `fromDate`. `toDate.date` is always >= `fromDate.date`; for a
  single-day booking the two share the same `date`.
  """
  toDate: JSON!

  """Approval state of the booking."""
  bookingStatus: TimeAwayBookingStatus!

  """
  The employee who filed the request (admin, manager, or the absentee
  themselves). Used for audit + permissioning; pair with `employeeId`
  when you need to disambiguate "self-booked vs booked-on-behalf".
  """
  bookedByEmployeeId: ID!

  """
  Free-text reason / note attached by the booking author. Stored as a
  rich-text JSON document (Slate-style), nullable.
  """
  explanation: JSON
  status: Int!

  """
  Whoever last transitioned `bookingStatus` (typically the approver who
  flipped `pending` → `approved` / `denied`, or the booking owner
  on cancel). Null until the first status transition after creation.
  """
  bookingStatusUpdatedByEmployeeId: ID

  """
  Timestamp of the last `bookingStatus` transition. Null until the
  first transition after creation. Pair with
  `bookingStatusUpdatedByEmployeeId` for an audit trail of who
  approved / denied / canceled the booking and when.
  """
  bookingStatusUpdatedAt: Date

  """
  Files (signed sick notes, permits, travel docs) uploaded by the
  booking author. Empty list when nothing was attached.
  """
  attachments: [ProtectedAsset]!
}

"""
Approval state of a time-away booking. Lifecycle: `pending` →
(`approved` | `denied` | `canceled`). `canceled` is the
owner-initiated retraction; `denied` is the approver-initiated
rejection. Note the canonical wire spelling is single-l `canceled` —
clients passing `cancelled` will be rejected by this enum.
"""
enum TimeAwayBookingStatus {
  approved
  canceled
  denied
  pending
}

input TimeAwayBookingFilters {
  timeAwayReasonId: [ID!]
  employeeId: [ID!]
  fromDate: DateInterval
  toDate: DateInterval
}

